name: Next Public CI

on:
  pull_request:
    paths:
      - 'next-public/**'
      - '.github/workflows/next-public-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'next-public/**'
      - '.github/workflows/next-public-ci.yml'

permissions:
  contents: read

concurrency:
  group: next-public-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: next-public

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: next-public/package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run deterministic tests
        run: |
          npm run test -- --reporter=json --outputFile=vitest-report.json
          node - <<'NODE'
          const report = require('./vitest-report.json')
          console.log(`Vitest: ${report.numPassedTests}/${report.numTotalTests} tests passed across ${report.numPassedTestSuites}/${report.numTotalTestSuites} suites.`)
          if (report.numFailedTests || report.numFailedTestSuites) process.exit(1)
          NODE

      - name: Upload deterministic test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-report
          path: next-public/vitest-report.json
          if-no-files-found: warn

      - name: Build production application
        run: npm run build
