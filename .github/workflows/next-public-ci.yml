name: Next Public CI

on:
  pull_request:
    paths:
      - 'next-public/**'
      - '.github/workflows/next-public-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'next-public/**'
      - '.github/workflows/next-public-ci.yml'

permissions:
  contents: read

concurrency:
  group: next-public-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: next-public

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: next-public/package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run deterministic tests
        run: npm run test

      - name: Build production application
        run: npm run build
